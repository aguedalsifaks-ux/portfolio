<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sifaks</title>
  <meta name="description" content="Toutes les façons de me contacter : courriel, LinkedIn et CV téléchargeable.">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/pages/contact.css">
</head>
<body>
  <main class="contact">
    <div class="container">
      <h1 class="contact__title reveal">Discutons de votre projet</h1>

      <div class="contact__context reveal reveal-delay-1">
        <p>Choisissez le moyen de contact qui vous convient le mieux.</p>
      </div>

      <div class="contact__methods-block reveal reveal-delay-2">
        <h2 class="sr-only">Moyens de me contacter</h2>

        <ul class="contact__methods grid grid--cols-3">
          <li>
            <a href="mailto:aguedalsifaks@gmail.com" class="contact-card">
              <span class="contact-card__badge">
                <svg class="contact-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M4.5 6.5h15a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-15a1 1 0 0 1-1-1v-9a1 1 0 0 1 1-1Z"/>
                  <path d="m4.5 7 7.5 5.5 7.5-5.5"/>
                </svg>
              </span>
              <span class="contact-card__label">Courriel</span>
              <span class="contact-card__value">aguedalsifaks@gmail.com</span>
            </a>
          </li>

          <li>
            <a href="https://wa.me/15414582416" class="contact-card" target="_blank" rel="noopener">
              <span class="contact-card__badge">
                <svg class="contact-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M12 4.5c-4.4 0-8 3.13-8 7 0 1.53.57 2.94 1.53 4.09L5 20l4.6-1.4c.75.24 1.55.37 2.4.37 4.4 0 8-3.13 8-7s-3.6-7-8-7Z"/>
                  <path d="M8.5 11h7M8.5 13.5h4.5"/>
                </svg>
              </span>
              <span class="contact-card__label">WhatsApp</span>
              <span class="contact-card__value">+1 541 458 2416</span>
            </a>
          </li>

          <li>
            <a href="https://calendly.com/aguedalsifaks/30min" class="contact-card" target="_blank" rel="noopener">
              <span class="contact-card__badge">
                <svg class="contact-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <rect x="4" y="5.5" width="16" height="14" rx="1.5"/>
                  <path d="M4 9.5h16"/>
                  <path d="M8 3.5v4M16 3.5v4"/>
                  <path d="m9 14 2 2 4-4.5"/>
                </svg>
              </span>
              <span class="contact-card__label">Réserver un appel</span>
              <span class="contact-card__value">30 minutes</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="contact__closing reveal reveal-delay-3">
        <p>Au plaisir d'échanger avec vous.</p>
      </div>

      <div class="contact__transition reveal reveal-delay-4">
        <a href="../index.html" class="btn btn--ghost">Retour à l'accueil</a>
        <p class="page-indicator">09 / 09</p>
      </div>
    </div>
  </main>
  <script src="../script.js"></script>
</body>
</html>
