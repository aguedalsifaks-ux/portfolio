<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réalisations visuelles — Sifaks</title>
  <meta name="description" content="Douze créatives réelles qui montrent comment donner une forme visuelle juste à une idée.">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/pages/realisations-visuelles.css">
</head>
<body>
  <main class="creatives">
    <div class="container">
      <h1 class="creatives__title reveal">Donner une forme aux idées</h1>

      <div class="creatives__context reveal reveal-delay-1">
        <p>Je conçois un visuel comme je conçois un message : sans superflu, avec une hiérarchie claire, toujours au service du propos plutôt que de l'esthétique pour elle-même.</p>
      </div>

      <div class="creatives__gallery reveal reveal-delay-2">
        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/VÉRITÉS CACHÉES DU RECRUTEMENT  EN 2025 .jpg" alt="Infographie « Vérités cachées du recrutement en 2025 », six statistiques en grille d'icônes" width="1587" height="2245">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Comment négocier son salaire .jpg" alt="Affiche « Comment négocier son salaire ? », avec une pile de pièces stylisée" width="1080" height="1080" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Le syndrome de l’imposteur.jpg" alt="Infographie « Le syndrome de l'imposteur » en forme d'iceberg" width="720" height="668" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/neuroscience & management.jpg" alt="Affiche « Neurosciences & Management », silhouette de tête avec un cerveau et un réseau de points" width="1608" height="1076" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Les Croyances qui Sabotent (Vraiment) ta Recherche de Poste.jpg" alt="Affiche « Les croyances qui sabotent (vraiment) ta recherche de poste », cinq idées reçues" width="1080" height="1080" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Le nouveau critère de succès  la narration professionnelle.jpg" alt="Affiche « Tu es compétent. Mais tu es invisible. Le nouveau critère de succès : la narration professionnelle », portrait d'un homme pensif" width="1024" height="831" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Infographie.png" alt="Infographie « Processus de recrutement amélioré par l'IA », entonnoir en cinq étapes" width="1421" height="882" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Preuve Sociale.jpg" alt="Affiche « La preuve sociale », main tenant un téléphone avec des icônes de likes" width="1080" height="1080" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Et si le marché n’était pas bouché, mais mal lu.jpg" alt="Affiche « Et si le marché de l'emploi n'était pas bouché, mais mal lu ? », fond bleu marine avec une loupe" width="1024" height="1024" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/téléchargement (3).jpeg" alt="Photographie d'un homme face à six portes sous un ciel dramatique, symbolisant un choix de carrière" width="736" height="736" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Travailler (ou survivre) en 2025 .jpg" alt="Affiche « Travailler (ou survivre) en 2025 », liste de cinq compétences avec une ampoule cerveau" width="1080" height="1080" loading="lazy">
        </button>

        <button class="creatives__item" type="button">
          <img class="creatives__thumb" src="../assets/images/creatives/Coacher  ou être coaché.jpg" alt="Affiche « Coacher ou être coaché ? », sur le coaching de carrière, avec une mise en scène d'escalier" width="1080" height="1080" loading="lazy">
        </button>
      </div>

      <div class="creatives__transition reveal reveal-delay-3">
        <a href="transformer-expertise-en-contenu.html" class="btn btn--primary">Voir ma méthode</a>
        <p class="page-indicator">05 / 09</p>
      </div>
    </div>

    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox__close" type="button" aria-label="Fermer l'aperçu">&times;</button>
      <img class="lightbox__image" id="lightbox-image" src="" alt="">
    </div>
  </main>
  <script src="../script.js"></script>
  <script src="../js/modules/realisations-visuelles.js"></script>
</body>
</html>
